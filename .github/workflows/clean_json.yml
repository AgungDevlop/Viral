name: Auto Clean Junk Videos

on:
  push:
    paths:
      - 'Video.json'
  workflow_dispatch:

jobs:
  filter-junk:
    runs-on: ubuntu-latest
    # Pindahkan env ke sini dan gunakan tanda kutip
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            Video.json
            filter.js
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run Filter
        run: node filter.js

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Video.json
          
          if ! git diff --staged --quiet; then
            git commit -m "Auto-filter: Menghapus judul video junk"
            git push
          fi
