name: Auto Clean Junk Videos

on:
  push:
    paths:
      - 'Video.json'
  workflow_dispatch:

jobs:
  filter-junk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Filter
        run: node filter.js

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Video.json
          
          if ! git diff --staged --quiet; then
            git commit -m "Auto-filter: Menghapus judul video junk"
            git push
          fi
